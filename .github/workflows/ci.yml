name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -- Lint: format + static analysis + flake check (Linux, fast) -------
  lint:
    name: Lint & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Check flake inputs (freshness)
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          fail-mode: true

      - name: Format check
        run: nix fmt -- --check .

      - name: deadnix - unused bindings
        run: nix run nixpkgs#deadnix -- --fail .

      - name: statix - anti-pattern lint
        run: nix run nixpkgs#statix -- check .

      - name: flake check + pre-commit hooks
        if: false
        run: nix flake check --no-build --show-trace

  # -- Build: macOS (darwin) configuration ------------------------------
  build-darwin:
    name: Build darwinConfiguration
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build darwin configuration
        run: |
          nix build .#darwinConfigurations.Admirs-MacBook-Pro-M1.system \
            --show-trace \
            --print-build-logs

  # -- Build: Linux (NixOS) configuration -------------------------------
  build-linux:
    name: Build nixosConfiguration
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build nixos configuration
        run: |
          nix build .#nixosConfigurations.nix-dev-box.config.system.build.toplevel \
            --show-trace \
            --print-build-logs
