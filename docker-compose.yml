# -- Docker Compose - nix-home test environment -------------------------------
#
# Runs lint/check targets inside a Nix container (Linux).
# NOTE: nix-darwin & Homebrew are macOS-only and are NOT tested here.
#       Covered: flake evaluation, nixfmt, statix, deadnix.
#
# Usage:
#   docker compose run --rm test       # run all checks (default)
#   docker compose run --rm fmt        # format check only
#   docker compose run --rm lint       # statix + deadnix only
#   docker compose run --rm check      # nix flake check --no-build only
# -----------------------------------------------------------------------------

x-nix-base: &nix-base
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - .:/workspace:ro
    - nix-store:/nix
  working_dir: /workspace

services:
  # Format check - mirrors `nix fmt -- --check .`
  fmt:
    <<: *nix-base
    command: >-
      nix fmt -- --check .

  # Static analysis - deadnix (unused bindings) + statix (anti-patterns)
  lint:
    <<: *nix-base
    command: >-
      sh -c "nix run nixpkgs#deadnix -- --fail . &&
             nix run nixpkgs#statix -- check ."

  # Flake evaluation - no build, catches type/assertion errors
  check:
    <<: *nix-base
    command: >-
      nix flake check --no-build

  # All-in-one: mirrors the CI lint job (`make docker-test`)
  test:
    <<: *nix-base
    command: >-
      sh -c "nix fmt -- --check . &&
             nix run nixpkgs#deadnix -- --fail . &&
             nix run nixpkgs#statix -- check . &&
             nix flake check --no-build"

volumes:
  # Persistent Nix store so packages survive container restarts
  nix-store:
